<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Planner - Skylit</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-50 text-gray-900">

<div class="max-w-3xl mx-auto p-6">

  <!-- Navbar -->
  <nav class="flex justify-between items-center mb-8">
    <h1 class="text-xl font-semibold">Skylit</h1>
    <div class="space-x-6 text-sm">
      <a href="index.html">Home</a>
      <a href="notes.html">Notes</a>
      <a href="pyq.html">PYQ</a>
      <a href="planner.html">Planner</a>
    </div>
  </nav>

  <h2 class="text-2xl font-semibold mb-6">⏳ Exam Planner</h2>

  <input id="hours" type="number" placeholder="Enter hours"
    class="w-full p-3 border rounded-lg mb-4">

  <button onclick="generatePlan()"
    class="bg-black text-white px-5 py-3 rounded-lg">
    Start
  </button>

  <p id="result" class="mt-6 text-lg font-medium"></p>

</div>

<script>
function generatePlan() {
  let hours = document.getElementById("hours").value;
  let result = document.getElementById("result");

  if(hours <= 2){
    result.innerText = "Revise only important questions.";
  } else if(hours <= 5){
    result.innerText = "Study key topics + practice PYQs.";
  } else {
    result.innerText = "Cover syllabus + revise + PYQs.";
  }
}
</script>

</body>
</html>
